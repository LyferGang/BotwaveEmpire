<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Botwave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; max-width: 500px; }
        .success-icon { width: 80px; height: 80px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 40px; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        h1 { font-size: 28px; margin-bottom: 15px; }
        p { color: #888; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #3b82f6; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 500; display: inline-block; transition: all 0.2s; }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .stripe-badge { background: linear-gradient(135deg, #635bff 0%, #00d4ff 100%); padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your purchase. Your Botwave service has been activated. You will receive a confirmation email shortly.</p>
        <a href="/" class="btn">Go to Dashboard</a>
        <div><span class="stripe-badge">Secured by Stripe</span></div>
    </div>
</body>
</html>
